<body>
  <main class="cover">
    <article class="card box box--lg radius radius--md">
      <a href="#" class="card__media-link">
        <img width="604" height="604" class="card__image radius radius--sm" alt="View Equilibrium #3429 NFT" />

        <span class="card__overlay radius radius--sm" aria-hidden="true">
          <svg class="card__eye-icon" aria-hidden="true" focusable="false" width="48" height="48" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd"><path d="M0 0h48v48H0z"/><path d="M24 9C14 9 5.46 15.22 2 24c3.46 8.78 12 15 22 15 10.01 0 18.54-6.22 22-15-3.46-8.78-11.99-15-22-15Zm0 25c-5.52 0-10-4.48-10-10s4.48-10 10-10 10 4.48 10 10-4.48 10-10 10Zm0-16c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6Z" fill="currentColor" fill-rule="nonzero"/></g></svg>
        </span>
      </a>
      <div class="card__content">
        <div class="card__header">
          <h1 class="text-preset-1"><a class="card__title-link" href="#">Equilibrium #3429</a></h1>
          <p class="text-preset-2">Our Equilibrium collection promotes balance and calm.</p>
        </div>
        <div class="card__details">
          <p class="card__price text-preset-3--semibold">
            <svg class="ethereum-icon" aria-hidden="true" focusable="false" width="11" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M11 10.216 5.5 18 0 10.216l5.5 3.263 5.5-3.262ZM5.5 0l5.496 9.169L5.5 12.43 0 9.17 5.5 0Z" fill="currentColor"/></svg>
            <span>0.041 ETH</span>
          </p>
          <p class="card__time text-preset-3--regular">
            <svg class="clock-icon" aria-hidden="true" focusable="false" width="17" height="17" xmlns="http://www.w3.org/2000/svg"><path d="M8.305 2.007a6.667 6.667 0 1 0 0 13.334 6.667 6.667 0 0 0 0-13.334Zm2.667 7.334H8.305a.667.667 0 0 1-.667-.667V6.007a.667.667 0 0 1 1.334 0v2h2a.667.667 0 0 1 0 1.334Z" fill="currentColor"/></svg>
            <span>3 days left</span>
          </p>
        </div>
        <div class="card__creator">
          <img class="avatar-icon" width="132" height="132" alt="Jules Wyvern" />
          <p class="text-preset-3--regular">Creation of <a class="creator__name" href="#">Jules Wyvern</a></p>
        </div>
      </div>
    </article>
  </main>

  <footer class="attribution">

        aria-hidden="true" class="external-icon">🔗</span></a>.
    Coded by <a class="link" target="_blank" rel="noopener noreferrer" aria-label="Author (opens in a new tab)"
      href="#">Berefire</a>.
  </footer>
</body>

</html>
